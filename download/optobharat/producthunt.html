icationsUnreadCount":0}},"networkStatus":7},"_R_iv5ubrhj9ivb_":{"data":{"product":null,"sidebarAd":{"__typename":"Ad","id":"34839","subject":"Channel","post":{"__typename":"Post","id":"488879","slug":"wispr-flow","name":"Wispr Flow","updatedAt":"2026-05-17T06:48:54-07:00","commentsCount":530,"product":{"__typename":"Product","id":"606339","reviewsRating":4.7,"reviewsCount":69,"slug":"wisprflow","isSubscribed":false},"topics":{"__typename":"TopicConnection","edges":[{"__typename":"TopicEdge","node":{"__typename":"Topic","id":"46","slug":"productivity","name":"Productivity"}},{"__typename":"TopicEdge","node":{"__typename":"Topic","id":"268","slug":"artificial-intelligence","name":"Artificial Intelligence"}},{"__typename":"TopicEdge","node":{"__typename":"Topic","id":"471","slug":"audio","name":"Audio"}}]},"featuredComment":{"__typename":"Comment","id":"3956824","path":"/products/wisprflow?comment=3956824","bodyText":"Hey Product Hunt 🎉 I’m Tanay, co-founder \u0026 CEO of Wispr Flow, a Mac dictation app that lets you speak naturally, and writes in your style, in every application — with auto-edits, command mode, and over 100 languages. ⭐ The founding story Ever since I watched the first Ironman movie in 2008 at age 10, I've wanted to build Jarvis. It drove me to pull my first all-nighter and start teaching myself how to code. 16 years later, I think we’ve found a way to make a voice experience delightful for all-day use. And there's no one else I'd build this with than my college roommate and closest friend @sahaj_garg2 Our vision is to make voice interfaces both useful (so you trust them) and ubiquitous (so you can use them everywhere). This is how we can move from screen-first technologies to voice-first technologies and build a future where we aren't stuck looking at our phones all day long. ⭐ Using Flow is super simple: 1. Download Flow for Mac 2. Press and hold [Fn] to start speaking in any app 3. Release [Fn] to enter text ⭐ What users love Flow for - 🛠️ Developers using Cursor / Claude / ChatGPT: Speak with AI assistants faster than typing. - ✉️ Professionals breezing through their inbox: Flow accurately captures names and formats your emails and Slack messages. - 🧑‍🎓 Students chatting with AI and finishing assignments even faster: We have a special student discount. - 📄 Product Managers drafting PRDs and sharing thoughts: Flow turns your rambles into clear ideas. - 👶 Parents with busy lives: Time is precious. Every second you save writing is an extra second you have for family. - 🤖 Tech-lovers who want to use voice with every AI tool ⭐ Here’s all you’ll get with Flow 1.0 — and we’re just getting started. 1. ⚡ Blazing fast dictation: Powered by Flow’s ultra-fast inference engine 2. 🎨 Tone match: You speak differently than you write. Flow learns your writing style across every application 3. 🔧 Auto-edits when you change your mind: “Hey lets meet at 5pm, actually lets do 6pm” → “Hey, lets meet at 6pm” 4. 😎 Command Mode for selected text: Say commands like “Flow, make this crisper and more assertive” without copy-pasting into other tools. 5. 🧩 Native integrations: Select text anywhere and just say: “Ask perplexity, what does this mean?” 6. 😶 Whispering mode: Use Flow around others by quietly whispering to your computer. 7. 🔒 Private by design: Your recordings locally on your computer by default. Only you have access to it. You can allow Flow to use your data to improve our models (disabled by default). Learn more: wispr.ai/data-usage For technical users, most voice dictation tools focus on technical metrics like \"word error rate.\" At Flow, we prioritize what truly matters to users: zero-edit messages. With Flow, you rarely need to return to your keyboard for edits. Our new approach has made Flow the first consumer voice dictation platform that makes people enjoy using voice more than their keyboards. ⭐ A final note Our dream is to create a world where interacting with technology feels as natural as interacting with people. I'd love your help to make this a reality. Try out Flow and share your feedback — we're eager to make it even more magical with your input. PS: A huge shoutout to our thousands of beta users who've showered us with love and feedback over the last few months. We wouldn't be here without you.","isPinned":true,"subject":{"__typename":"Post","id":"488879"},"user":{"__typename":"User","id":"3736151","username":"tanaykothari","name":"Tanay Kothari","avatarUrl":"https://ph-avatars.imgix.net/3736151/original.png"}},"hideVotesCount":false,"featuredAt":"2024-09-30T00:01:00-07:00","createdAt":"2024-09-30T00:01:00-07:00","disabledWhenScheduled":true,"embargoPreviewAt":null,"latestScore":2368,"launchDayScore":1511,"randomizationStatus":{"__typename":"FeedRandomizationStatus","randomDay":false,"active":false,"nextTransitionAt":null},"hasVoted":false},"name":"Wispr Flow","tagline":"Stop typing. Start speaking. 4x faster. ","thumbnailUuid":"ebbe0b72-5669-4449-8ea0-f2a8b1f42dcf.png","promotedPillImageUrl":"/i/4e06b4ad5a08189364c05cc9ca2b605bf9d0ebe03e202b4a87a7236a746dab8e","largeAssetUuid":null,"smallAssetUuid":null,"url":"/r/ad/34839","variationId":null,"channelKind":"sidebar"},"viewer":{"__typename":"Viewer","abTest":null}},"networkStatus":7},"_R_iv5ubrhj9ivbH1_":{"data":undefined,"loading":false,"networkStatus":7,"called":false}},"events":[{"type":"started","options":{"variables":{"slug":"optoai","includeAlternatives":true},"fetchPolicy":"cache-first","query":"query ProductsPageLayout($slug:String!$includeAlternatives:Boolean!){product(slug:$slug excludeTrashed:true){id canEdit ...ProductsPageLayoutSidebar ...ProductsPageLayoutHeader ...UpcomingEventPanelProductFragment upcomingLaunch{...UpcomingEventPanelPostFragment}structuredData}sidebarAd:ad(kind:\"sidebar\" bundle:product_sidebar targeted:false parentSubject:\"Product\" parentSlug:$slug)@include(if:$includeAlternatives){...AdFragment ...GhostAdFragment}viewer@include(if:$includeAlternatives){abTest(testName:\"sidebar_ad_loo st Ironman movie in 2008 at age 10, I've wanted to build Jarvis. It drove me to pull my first all-nighter and start teaching myself how to code. 16 years later, I think we’ve found a way to make a voice experience delightful for all-day use. And there's no one else I'd build this with than my college roommate and closest friend @sahaj_garg2 Our vision is to make voice interfaces both useful (so you trust them) and ubiquitous (so you can use them everywhere). This is how we can move from screen-first technologies to voice-first technologies and build a future where we aren't stuck looking at our phones all day long. ⭐ Using Flow is super simple: 1. Download Flow for Mac 2. Press and hold [Fn] to start speaking in any app 3. Release [Fn] to enter text ⭐ What users love Flow for - 🛠️ Developers using Cursor / Claude / ChatGPT: Speak with AI assistants faster than typing. - ✉️ Professionals breezing through their inbox: Flow accurately captures names and formats your emails and Slack messages. - 🧑‍🎓 Students chatting with AI and finishing assignments even faster: We have a special student discount. - 📄 Product Managers drafting PRDs and sharing thoughts: Flow turns your rambles into clear ideas. - 👶 Parents with busy lives: Time is precious. Every second you save writing is an extra second you have for family. - 🤖 Tech-lovers who want to use voice with every AI tool ⭐ Here’s all you’ll get with Flow 1.0 — and we’re just getting started. 1. ⚡ Blazing fast dictation: Powered by Flow’s ultra-fast inference engine 2. 🎨 Tone match: You speak differently than you write. Flow learns your writing style across every application 3. 🔧 Auto-edits when you change your mind: “Hey lets meet at 5pm, actually lets do 6pm” → “Hey, lets meet at 6pm” 4. 😎 Command Mode for selected text: Say commands like “Flow, make this crisper and more assertive” without copy-pasting into other tools. 5. 🧩 Native integrations: Select text anywhere and just say: “Ask perplexity, what does this mean?” 6. 😶 Whispering mode: Use Flow around others by quietly whispering to your computer. 7. 🔒 Private by design: Your recordings locally on your computer by default. Only you have access to it. You can allow Flow to use your data to improve our models (disabled by default). Learn more: wispr.ai/data-usage For technical users, most voice dictation tools focus on technical metrics like \"word error rate.\" At Flow, we prioritize what truly matters to users: zero-edit messages. With Flow, you rarely need to return to your keyboard for edits. Our new approach has made Flow the first consumer voice dictation platform that makes people enjoy using voice more than their keyboards. ⭐ A final note Our dream is to create a world where interacting with technology feels as natural as interacting with people. I'd love your help to make this a reality. Try out Flow and share your feedback — we're eager to make it even more magical with your input. PS: A huge shoutout to our thousands of beta users who've showered us with love and feedback over the last few months. We wouldn't be here without you.","isPinned":true,"subject":{"__typename":"Post","id":"488879"},"user":{"__typename":"User","id":"3736151","username":"tanaykothari","name":"Tanay Kothari","avatarUrl":"https://ph-avatars.imgix.net/3736151/original.png"}},"hideVotesCount":false,"featuredAt":"2024-09-30T00:01:00-07:00","createdAt":"2024-09-30T00:01:00-07:00","disabledWhenScheduled":true,"embargoPreviewAt":null,"latestScore":2368,"launchDayScore":1511,"randomizationStatus":{"__typename":"FeedRandomizationStatus","randomDay":false,"active":false,"nextTransitionAt":null},"hasVoted":false},"name":"Wispr Flow","tagline":"Stop typing. Start speaking. 4x faster. ","thumbnailUuid":"ebbe0b72-5669-4449-8ea0-f2a8b1f42dcf.png","promotedPillImageUrl":"/i/4e06b4ad5a08189364c05cc9ca2b605bf9d0ebe03e202b4a87a7236a746dab8e","largeAssetUuid":null,"smallAssetUuid":null,"url":"/r/ad/34839","variationId":null,"channelKind":"sidebar"},"viewer":{"__typen
